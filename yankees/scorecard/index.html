<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>The Scorecard Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;0,900;1,700&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;500;600;700&family=Special+Elite&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="sc-pencil" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sc-pencil-heavy" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" seed="5"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sc-pencil-text" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<div id="app">
  <header class="masthead">
    <a href="../" class="lineup-link">&larr; The Morning Lineup</a>
    <h1>The Scorecard Book</h1>
    <div class="subtitle">A digital scorer's book for every game</div>
  </header>
  <main id="main"></main>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="zone-overlay" id="zone-overlay"></div>
<script src="api.js"></script>
<script src="parser.js"></script>
<script src="diamond.js"></script>
<script src="scorebook.js"></script>
<script src="header.js"></script>
<script src="panels.js"></script>
<script src="finder.js"></script>
<script src="tooltip.js"></script>
<script src="app.js"></script>
</body>
</html>
