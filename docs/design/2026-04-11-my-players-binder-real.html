<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>My Players — Binder (real cards)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;0,900;1,700&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Lora:ital,wght@0,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f4ecd8;
    --navy-deep:    #060a1a;
    --navy:         #0d1530;
    --navy-2:       #14203f;
    --navy-edge:    #1c2a4d;
    --navy-rule:    #2a3a60;
    --ink:          #0d0f14;
    --ink-mute:     #5a5750;
    --red:          #c8102e;
    --red-bright:   #e63040;
    --gold:         #c9a24a;
    --gold-bright:  #e8c878;
    --gold-foil:    #f0d57a;

    --display: 'Playfair Display', Georgia, serif;
    --condensed: 'Oswald', Impact, sans-serif;
    --mono: 'IBM Plex Mono', Menlo, monospace;
    --body: 'Lora', Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background:
      radial-gradient(ellipse at top, var(--navy-2) 0%, var(--navy-deep) 80%);
    color: var(--paper);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Subtle film grain over everything */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.10;
    mix-blend-mode: overlay;
    background-image:
      radial-gradient(circle at 25% 35%, #fff 0, transparent 1px),
      radial-gradient(circle at 75% 65%, #fff 0, transparent 1px),
      radial-gradient(circle at 50% 80%, #fff 0, transparent 1px);
    background-size: 3px 3px, 5px 5px, 7px 7px;
  }

  .stage {
    max-width: 980px;
    margin: 50px auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ========== DARK BINDER FRAME ========== */
  .binder {
    background:
      /* leather grain */
      repeating-linear-gradient(45deg, transparent 0, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 4px),
      repeating-linear-gradient(-45deg, transparent 0, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 6px),
      linear-gradient(180deg, var(--navy-2) 0%, var(--navy) 50%, var(--navy-deep) 100%);
    border: 1px solid var(--gold);
    border-radius: 3px;
    box-shadow:
      inset 0 0 0 1px rgba(232,200,120,.18),
      inset 0 0 60px rgba(0,0,0,.6),
      0 0 0 1px var(--navy-deep),
      0 0 0 6px var(--navy),
      0 0 0 7px var(--gold),
      0 50px 100px -40px rgba(0,0,0,.85),
      0 20px 40px -20px rgba(0,0,0,.6);
    padding: 32px 38px 38px;
    position: relative;
  }

  /* Embossed gold corner ornaments */
  .binder::before,
  .binder::after {
    content: '';
    position: absolute;
    width: 40px;
    height: 40px;
    border: 1px solid var(--gold);
    pointer-events: none;
  }
  .binder::before {
    top: 12px;
    left: 12px;
    border-right: none;
    border-bottom: none;
  }
  .binder::after {
    top: 12px;
    right: 12px;
    border-left: none;
    border-bottom: none;
  }

  /* Three-hole punch left edge — recessed metal grommets */
  .punch-strip {
    position: absolute;
    left: 14px;
    top: 70px;
    bottom: 70px;
    width: 14px;
    pointer-events: none;
  }
  .punch-strip::before,
  .punch-strip::after,
  .punch-strip span {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #000 0%, #000 60%, var(--navy-deep) 100%);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,.9),
      0 1px 0 rgba(232,200,120,.4);
  }
  .punch-strip::before { top: 0; }
  .punch-strip::after  { bottom: 0; }
  .punch-strip span    { top: 50%; margin-top: -6px; }

  .binder-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--gold);
    padding: 0 0 16px 36px;
    margin-bottom: 8px;
    position: relative;
  }
  .binder-head::after {
    content: '';
    position: absolute;
    left: 36px;
    right: 0;
    bottom: -3px;
    height: 1px;
    background: var(--gold);
    opacity: .35;
  }

  .bh-title {
    font-family: var(--display);
    font-style: italic;
    font-weight: 900;
    font-size: 44px;
    line-height: .9;
    margin: 0;
    letter-spacing: -.02em;
    color: var(--paper);
    text-shadow:
      0 1px 0 rgba(0,0,0,.6),
      0 0 24px rgba(232,200,120,.15);
  }
  .bh-title em {
    font-style: normal;
    color: var(--gold-foil);
    text-shadow:
      0 1px 0 rgba(0,0,0,.7),
      0 0 18px rgba(232,200,120,.5);
  }
  .bh-sub {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .22em;
    color: var(--gold);
    margin-top: 10px;
  }
  .bh-meta {
    text-align: right;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--gold);
    line-height: 1.6;
  }
  .bh-meta strong {
    color: var(--paper);
    font-size: 24px;
    font-family: var(--display);
    font-style: italic;
    font-weight: 800;
    text-shadow: 0 0 16px rgba(232,200,120,.3);
  }
  .bh-meta .stamp {
    display: inline-block;
    margin-top: 8px;
    border: 1.5px solid var(--red-bright);
    color: var(--red-bright);
    padding: 3px 10px;
    font-family: var(--condensed);
    font-weight: 600;
    letter-spacing: .22em;
    transform: rotate(-2deg);
    text-shadow: 0 0 8px rgba(230,48,64,.4);
    box-shadow: 0 0 18px rgba(230,48,64,.18);
  }
  .binder-rule {
    height: 6px;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    margin: 6px 0 30px 36px;
    background: linear-gradient(90deg, transparent, rgba(232,200,120,.08), transparent);
  }

  /* ========== POCKET GRID — uses real cards from player-card.js ========== */
  .pocket-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px 24px;
    padding-left: 36px;
  }
  @media (max-width: 820px) {
    .pocket-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 520px) {
    .pocket-grid { grid-template-columns: 1fr; }
  }

  /* The pocket scales the real .pc-wrap (which is 360px wide by default) down */
  .pocket {
    position: relative;
    animation: deal-in .7s cubic-bezier(.2,.7,.2,1) both;
  }
  .pocket:nth-child(1) { animation-delay: .05s; }
  .pocket:nth-child(2) { animation-delay: .12s; }
  .pocket:nth-child(3) { animation-delay: .19s; }
  .pocket:nth-child(4) { animation-delay: .26s; }
  .pocket:nth-child(5) { animation-delay: .33s; }
  .pocket:nth-child(6) { animation-delay: .40s; }
  @keyframes deal-in {
    0%   { opacity: 0; transform: translateY(20px) rotateZ(-3deg); }
    100% { opacity: 1; transform: translateY(0) rotateZ(0); }
  }

  /* Pocket recess — a vellum sleeve in the dark binder */
  .pocket::before {
    content: '';
    position: absolute;
    inset: -10px -8px -16px -8px;
    border: 1px solid rgba(232,200,120,.22);
    border-radius: 4px;
    background:
      linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,.55) 100%);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,.6),
      inset 0 -1px 0 rgba(232,200,120,.1);
    z-index: 0;
    pointer-events: none;
  }

  /* Override the modal-sized .pc-wrap inside a binder pocket */
  .pocket .pc-wrap {
    width: 100% !important;
    max-width: none !important;
    margin: 0 !important;
    position: relative;
    z-index: 1;
  }
  .pocket .pc-card {
    box-shadow:
      0 24px 48px -18px rgba(0,0,0,.8),
      0 8px 18px -8px rgba(0,0,0,.6),
      0 0 0 1px rgba(232,200,120,.15) !important;
  }
  .pocket:hover .pc-card:not(.flipped) {
    transform: translateY(-6px) rotateZ(-.5deg) !important;
    box-shadow:
      0 32px 64px -18px rgba(0,0,0,.85),
      0 12px 24px -10px rgba(0,0,0,.7),
      0 0 0 1px var(--gold-foil),
      0 0 30px rgba(232,200,120,.18) !important;
  }
  .pocket:hover .pc-card.flipped {
    transform: translateY(-6px) rotateY(180deg) rotateZ(.5deg) !important;
  }

  /* Pocket label below each card — engraved brass plate feel */
  .pocket-label {
    position: absolute;
    bottom: -28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--gold);
    z-index: 2;
  }
  .pocket-label .slot {
    color: var(--paper);
    font-weight: 600;
    font-style: italic;
    font-family: var(--display);
    font-size: 12px;
    letter-spacing: 0;
    text-shadow: 0 0 10px rgba(232,200,120,.3);
  }

  .binder-foot {
    margin: 56px 0 0 36px;
    padding-top: 16px;
    border-top: 1px solid var(--gold);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--gold);
  }
  .binder-foot .hint {
    font-style: italic;
    font-family: var(--body);
    font-size: 11px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--paper);
    opacity: .75;
  }
  .binder-foot a {
    color: var(--gold-foil);
    border-bottom: 1px dotted var(--gold);
    text-decoration: none;
  }
  .binder-foot a:hover {
    color: var(--paper);
    border-bottom-color: var(--paper);
  }

  .annotation {
    margin-top: 36px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .7;
  }
  .annotation strong { color: var(--gold-foil); }

  .loading {
    text-align: center;
    padding: 40px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .18em;
    color: var(--gold);
  }
</style>
</head>
<body>

<div class="stage">
  <section class="binder">
    <div class="punch-strip"><span></span></div>
    <header class="binder-head">
      <h2 class="bh-title">
        My <em>Players</em>
        <span class="bh-sub">Binder Page · Personal Roster</span>
      </h2>
      <div class="bh-meta">
        <strong>06</strong> followed<br>
        Apr 11 · Live<br>
        <span class="stamp">Approved</span>
      </div>
    </header>
    <div class="binder-rule"></div>

    <div class="pocket-grid" id="pocket-grid">
      <p class="loading">Loading roster…</p>
    </div>

    <div class="binder-foot">
      <span class="hint">Tap a card to flip · Real cards from player-card.js</span>
      <a href="#">Manage roster →</a>
    </div>
  </section>

  <p class="annotation">
    Mockup · <strong>Binder</strong> using the real card component
  </p>
</div>

<!-- Load the real player-card component -->
<script src="../../player-card.js"></script>
<script>
  // Sample roster — replace with real followed_players from Supabase later.
  const ROSTER = [
    { pid: '691718', team: 'cubs',     slot: '01' },
    { pid: '592450', team: 'yankees',  slot: '02' },
    { pid: '605141', team: 'dodgers',  slot: '03' },
    { pid: '669373', team: 'tigers',   slot: '04' },
    { pid: '677951', team: 'royals',   slot: '05' },
    { pid: '675911', team: 'braves',   slot: '06' },
  ];

  async function buildBinder() {
    const grid = document.getElementById('pocket-grid');
    grid.innerHTML = '';

    const ML = window.MorningLineupPC;
    if (!ML) {
      grid.innerHTML = '<p class="loading" style="color:#c8102e">player-card.js not loaded</p>';
      return;
    }

    // Pre-fetch every unique team's JSON ourselves (because the component
    // uses ../data which won't resolve from docs/design/) and seed the cache.
    const uniqueTeams = [...new Set(ROSTER.map((r) => r.team))];
    await Promise.all(
      uniqueTeams.map(async (slug) => {
        const res = await fetch(`../../data/players-${slug}.json`);
        const data = res.ok ? await res.json() : { players: {} };
        ML.seedCache(slug, data);
      })
    );

    for (const r of ROSTER) {
      const pocket = document.createElement('div');
      pocket.className = 'pocket';

      const cardHost = document.createElement('div');
      pocket.appendChild(cardHost);

      const label = document.createElement('div');
      label.className = 'pocket-label';
      label.innerHTML = `<span class="slot">Slot ${r.slot}</span> · ${r.team.toUpperCase()}`;
      pocket.appendChild(label);

      grid.appendChild(pocket);

      try {
        await ML.mountInline(cardHost, r.pid, r.team);
      } catch (e) {
        cardHost.innerHTML = `<p class="loading">Failed to load ${r.pid}</p>`;
        console.warn('mount failed', r, e);
      }
    }
  }

  // Wait for the deferred player-card.js to finish defining MorningLineupPC
  if (window.MorningLineupPC) {
    buildBinder();
  } else {
    window.addEventListener('load', buildBinder);
  }
</script>

</body>
</html>
